name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below.

  - type: input
    id: version
    attributes:
      label: toksave version
      description: Run `toksave --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x64)
        - Linux (arm64)
        - Windows (x64)
    validations:
      required: true

  - type: dropdown
    id: agent
    attributes:
      label: Affected Agent
      options:
        - Claude Code
        - OpenCode
        - Codex
        - Antigravity
        - All
        - N/A
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands or steps to trigger the bug.
      placeholder: |
        1. Run `toksave --agents claude`
        2. ...
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste the output of `toksave doctor`
      render: text
    validations:
      required: false
